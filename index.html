<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyna-Q Food Delivery Simulator</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">

    <!-- Left: map + comparison -->
    <div class="left-col">
      <section class="map-panel">
        <div class="map-wrap">
          <canvas id="mapCanvas" width="360" height="360"></canvas>
        </div>
        <div class="legend">
          <span><i class="sw road"></i>Дорога</span>
          <span><i class="sw wall"></i>Будівля</span>
          <span>🍕 Ресторан</span>
          <span>📍 Клієнт</span>
          <span>🛵 Кур'єр</span>
          <span>📦 З замовленням</span>
        </div>
      </section>


      <div class="compare-panel">
        <div class="compare-header">
          <span class="compare-title">Порівняння експериментів</span>
          <button class="btn-clear" id="clearCompareBtn">Очистити</button>
        </div>
        <div class="compare-body">
          <div class="compare-chart-wrap">
            <canvas id="compareChart"></canvas>
          </div>
          <div class="compare-labels" id="compareLabels">
            <span class="compare-empty">Ще немає даних</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: sidebar full height -->
    <aside class="sidebar">
      <div class="chart-container">
        <canvas id="rewardChart"></canvas>
      </div>

      <section class="control-group">
        <h2>Hyperparameters</h2>
        <label class="slider">
          <span class="label-text">α (learning rate) <b id="alphaVal">0.10</b></span>
          <input type="range" id="alpha" min="0.01" max="0.5" step="0.01" value="0.1">
        </label>
        <label class="slider">
          <span class="label-text">γ (discount) <b id="gammaVal">0.95</b></span>
          <input type="range" id="gamma" min="0.5" max="0.99" step="0.01" value="0.95">
        </label>
        <label class="slider">
          <span class="label-text">ε (exploration) <b id="epsilonVal">0.10</b></span>
          <input type="range" id="epsilon" min="0.01" max="0.5" step="0.01" value="0.1">
        </label>
        <label class="slider">
          <span class="label-text">n (planning steps) <b id="planningVal">10</b></span>
          <input type="range" id="planning" min="0" max="50" step="1" value="10">
        </label>
        <label class="slider">
          <span class="label-text">Max steps <b id="maxStepsVal">5000</b></span>
          <input type="range" id="maxSteps" min="500" max="50000" step="500" value="5000">
        </label>
        <label class="slider">
          <span class="label-text">Tick delay (ms) <b id="tickDelayVal">10</b></span>
          <input type="range" id="tickDelay" min="0" max="200" step="5" value="10">
        </label>
      </section>

      <section class="control-group stats">
        <h2>Status</h2>
        <div class="stat-row"><span>Загальних кроків</span><b id="statEpisode">0</b></div>
        <div class="stat-row"><span>Reward (100 кроків)</span><b id="statReward">0</b></div>
        <div class="stat-row"><span>Доставлено</span><b id="statDeliveries">0</b></div>
      </section>

      <section class="control-group actions">
        <button id="startStopBtn" class="btn btn-primary">▶ Старт</button>
      </section>
    </aside>

  </div>

  <script src="js/environment.js"></script>
  <script src="js/agent.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
